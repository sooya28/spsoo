<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날짜 계산기 - Sooya's World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background: #f0f9ff;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            padding: 20px;
        }
        .comic-border {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        input, button {
            border: 3px solid #000 !important;
            border-radius: 12px !important;
            padding: 10px 15px !important;
            font-family: 'Jua', sans-serif;
        }
        input:focus {
            outline: none;
            background: #fff9db;
        }
        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        .result {
            color: #ef4444;
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }
        h2 {
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #000;
        }
    </style>
</head>
<body>

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <h2 class="text-5xl font-black text-blue-600 italic mb-2">📅 날짜 계산기</h2>
            <p class="text-blue-400 bg-white inline-block px-4 py-1 rounded-full border-2 border-black">시간을 달리는 수야의 도구</p>
        </header>

        <!-- 1. 오늘로부터 n일 후 -->
        <div class="card comic-border">
            <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-yellow-400 w-8 h-8 flex items-center justify-center rounded-full border-2 border-black text-sm">1</span>
                오늘로부터 n일 후는?
            </h3>
            <div class="flex flex-wrap gap-2">
                <input type="number" id="nDaysFromToday" placeholder="며칠 뒤?" class="flex-1 min-w-[120px]">
                <button onClick="calculateFromToday()">계산하기!</button>
            </div>
            <div class="result" id="result1"></div>
        </div>

        <!-- 2. 특정일까지 남은 날 -->
        <div class="card comic-border">
            <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-green-400 w-8 h-8 flex items-center justify-center rounded-full border-2 border-black text-sm">2</span>
                디데이(D-Day) 계산기
            </h3>
            <div class="flex flex-wrap gap-2">
                <input type="date" id="targetDate" class="flex-1 min-w-[120px]">
                <button onClick="calculateUntil()">남은 날 확인</button>
            </div>
            <div class="result" id="result5"></div>
        </div>

        <!-- 3. 특정일로부터 n일 후 -->
        <div class="card comic-border">
            <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-blue-400 w-8 h-8 flex items-center justify-center rounded-full border-2 border-black text-sm">3</span>
                특정일로부터 n일 후
            </h3>
            <div class="flex flex-wrap gap-2 items-center">
                <input type="date" id="specificDate2">
                <span>기준으로</span>
                <input type="number" id="nDaysAfter" placeholder="n일" class="w-24">
                <span>일 뒤는?</span>
                <button onClick="calculateAfter()">계산</button>
            </div>
            <div class="result" id="result2"></div>
        </div>

        <!-- 4. 특정일로부터 n일 전 -->
        <div class="card comic-border">
            <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-purple-400 w-8 h-8 flex items-center justify-center rounded-full border-2 border-black text-sm">4</span>
                특정일로부터 n일 전
            </h3>
            <div class="flex flex-wrap gap-2 items-center">
                <input type="date" id="specificDate3">
                <span>기준으로</span>
                <input type="number" id="nDaysBefore" placeholder="n일" class="w-24">
                <span>일 전은?</span>
                <button onClick="calculateBefore()">계산</button>
            </div>
            <div class="result" id="result3"></div>
        </div>

        <!-- 5. 특정일 사이의 간격 -->
        <div class="card comic-border">
            <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-red-400 w-8 h-8 flex items-center justify-center rounded-full border-2 border-black text-sm">5</span>
                두 날짜 사이의 간격
            </h3>
            <div class="flex flex-wrap gap-2 items-center">
                <input type="date" id="startDate">
                <span>부터</span>
                <input type="date" id="endDate">
                <span>까지는 며칠?</span>
                <button onClick="calculateBetween()">간격 계산</button>
            </div>
            <div class="result" id="result4"></div>
        </div>

        <!-- Home Button -->
        <div class="text-center mt-12 pb-10">
            <a href="../index.html" class="inline-flex items-center gap-2 bg-white px-8 py-3 rounded-2xl comic-border text-xl font-bold hover:bg-gray-100 transition-all active:scale-95">
                🏠 홈으로 돌아가기
            </a>
        </div>
    </div>

    <script>
        const weekdays = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

        function formatDate(date) {
            return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 (${weekdays[date.getDay()]})`;
        }

        function calculateFromToday() {
            const val = document.getElementById('nDaysFromToday').value;
            if (val === "") return;
            const n = parseInt(val);
            const today = new Date();
            today.setDate(today.getDate() + n);
            document.getElementById('result1').textContent = "👉 " + formatDate(today);
        }

        function calculateAfter() {
            const dateStr = document.getElementById('specificDate2').value;
            const n = parseInt(document.getElementById('nDaysAfter').value);
            if (!dateStr || isNaN(n)) return alert('날짜와 n일을 모두 입력하세요.');
            const date = new Date(dateStr);
            date.setDate(date.getDate() + n);
            document.getElementById('result2').textContent = "👉 " + formatDate(date);
        }

        function calculateBefore() {
            const dateStr = document.getElementById('specificDate3').value;
            const n = parseInt(document.getElementById('nDaysBefore').value);
            if (!dateStr || isNaN(n)) return alert('날짜와 n일을 모두 입력하세요.');
            const date = new Date(dateStr);
            date.setDate(date.getDate() - n);
            document.getElementById('result3').textContent = "👉 " + formatDate(date);
        }

        function calculateBetween() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (!start || !end) return alert('두 날짜를 모두 입력하세요.');
            const startDate = new Date(start);
            const endDate = new Date(end);
            const diffTime = endDate - startDate;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('result4').textContent = "👉 총 " + diffDays + "일 입니다.";
        }

        function calculateUntil() {
            const targetStr = document.getElementById('targetDate').value;
            if (!targetStr) return alert('날짜를 입력하세요.');
            const today = new Date();
            today.setHours(0,0,0,0);
            const targetDate = new Date(targetStr);
            targetDate.setHours(0,0,0,0);

            const diffTime = targetDate - today;
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

            let text = `✨ ${formatDate(targetDate)}까지 `;

            if (diffDays > 0) {
                text += `${diffDays}일 남았습니다! (D-${diffDays})`;
            } else if (diffDays === 0) {
                text += `오늘입니다! 🎉`;
            } else {
                text += `${Math.abs(diffDays)}일 지났습니다.`;
            }
            document.getElementById('result5').textContent = text;
        }
    </script>

</body>
</html>
