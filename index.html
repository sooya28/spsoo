<!DOCTYPE html>
<html lang="ko">        
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수야의 유용한 도구들</title>
    <meta name="google-adsense-account" content="ca-pub-2996601196621860">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2996601196621860"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>수야의 유용한 도구들</h1>
        </header>
        <main>
            <div class="info-grid">
                <section class="info-section collapsed" id="section-weather">
                    <div class="section-header">
                        <h2>실시간 날씨 정보</h2>
                        <button class="toggle-btn" onclick="toggleSection('section-weather')">펼치기</button>
                    </div>
                    <div class="section-content">
                        <div class="city-selector">
                            <select id="city-select">
                                <option value="Busan">부산</option>
                                <option value="Seoul">서울</option>
                                <option value="Incheon">인천</option>
                                <option value="Daegu">대구</option>
                                <option value="Daejeon">대전</option>
                                <option value="Gwangju">광주</option>
                                <option value="Ulsan">울산</option>
                            </select>
                            <button id="details-button">오늘의 상세날씨</button>
                        </div>
                        <p class="update-time" id="weather-updated">정보 업데이트: -</p>
                        <weather-card></weather-card>
                    </div>
                </section>

                <section class="info-section collapsed" id="section-exchange">
                    <div class="section-header">
                        <h2>실시간 환율 정보 (KRW 기준)</h2>
                        <button class="toggle-btn" onclick="toggleSection('section-exchange')">펼치기</button>
                    </div>
                    <div class="section-content">
                        <p class="update-time" id="exchange-updated">정보 업데이트: -</p>
                        <exchange-card></exchange-card>
                    </div>
                </section>

                <section class="info-section collapsed" id="section-qr">
                    <div class="section-header">
                        <h2>QR코드 생성기</h2>
                        <button class="toggle-btn" onclick="toggleSection('section-qr')">펼치기</button>
                    </div>
                    <div class="section-content">
                        <qr-card></qr-card>
                    </div>
                </section>

                <section class="info-section collapsed" id="section-lotto">
                    <div class="section-header">
                        <h2>로또번호 생성기</h2>
                        <button class="toggle-btn" onclick="toggleSection('section-lotto')">펼치기</button>
                    </div>
                    <div class="section-content">
                        <lotto-card></lotto-card>
                    </div>
                </section>
            </div>

            <!-- 관리자에게 메시지 보내기 섹션 -->
            <section class="info-section collapsed" id="section-contact">
                <div class="section-header">
                    <h2>관리자에게 메시지 보내기</h2>
                    <button class="toggle-btn" onclick="toggleSection('section-contact')">펼치기</button>
                </div>
                <div class="section-content">
                    <form action="https://formspree.io/f/mgopjkyl" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="email">이메일 주소</label>
                            <input type="email" name="email" id="email" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">메시지</label>
                            <textarea name="message" id="message" rows="4" placeholder="관리자에게 전달할 내용을 입력하세요" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">메시지 전송</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="main.js"></script>
    <script>
        function toggleSection(id) {
            const section = document.getElementById(id);
            const btn = section.querySelector('.toggle-btn');
            const isCollapsed = section.classList.toggle('collapsed');
            btn.textContent = isCollapsed ? '펼치기' : '접기';
        }
        window.toggleSection = toggleSection;
    </script>
</body>
</html>
