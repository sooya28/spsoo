<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0c;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #1a1a1f;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
        }

        canvas {
            border: 2px solid #333;
            background-color: #000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        #side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 150px;
        }

        .stat-box {
            background: #25252b;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00f2ff;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            z-index: 100;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #00f2ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-guide {
            background: #25252b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 11px;
            line-height: 1.8;
            color: #ccc;
            border: 1px solid #444;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            transform: translateY(-2px);
        }

        #pause-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ff0d72;
            text-shadow: 0 0 10px #ff0d72;
            display: none;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="pause-status">PAUSED</div>
        
        <div id="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">NEXT</div>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
                <div class="stat-box">
                    <div class="stat-label">SCORE</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">LINES</div>
                    <div id="lines" class="stat-value">0</div>
                </div>
            </div>
            <div style="font-size: 10px; color: #555; text-align: center;">Press 'P' to Pause</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>NEON TETRIS</h1>
            <div class="controls-guide">
                [ 조작 방법 ]<br>
                이동: 좌우 화살표 (←, →)<br>
                회전: 위 화살표 (↑)<br>
                빠르게 내리기: 아래 화살표 (↓)<br>
                바로 내리기: 스페이스바 (Space)<br>
                일시정지: P
            </div>
            <button id="start-btn" class="btn">GAME START</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1>GAME OVER</h1>
            <p id="final-score-display" style="margin-bottom: 20px; font-size: 18px;">Score: 0</p>
            <button id="restart-btn" class="btn">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const pauseDisplay = document.getElementById('pause-status');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        // --- 오디오 시스템 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type, duration, vol = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.connect(gain);
            gain.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        const SFX = {
            move: () => playSound(150, 'sine', 0.05, 0.05),
            rotate: () => playSound(300, 'square', 0.1, 0.05),
            drop: () => playSound(100, 'sine', 0.1, 0.1),
            clear: () => {
                playSound(440, 'triangle', 0.2, 0.1);
                setTimeout(() => playSound(880, 'triangle', 0.3, 0.1), 100);
            },
            gameOver: () => {
                playSound(300, 'sawtooth', 0.3, 0.1);
                setTimeout(() => playSound(200, 'sawtooth', 0.3, 0.1), 200);
                setTimeout(() => playSound(100, 'sawtooth', 0.5, 0.1), 400);
            }
        };

        const colors = [
            null,
            '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF',
        ];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = colors[value];
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.shadowBlur = 0;
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function drawNext() {
            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            const offset = { x: 1, y: 1 };
            drawMatrix(player.next, offset, nextContext);
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.strokeStyle = '#111';
            context.lineWidth = 0.02;
            for(let i=0; i<12; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 20); context.stroke();
            }
            for(let i=0; i<20; i++) {
                context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let clearedCount = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                clearedCount++;
            }
            if (clearedCount > 0) {
                player.score += clearedCount * 10 * clearedCount;
                player.lines += clearedCount;
                SFX.clear();
                updateScore();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                SFX.drop();
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            SFX.drop();
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                SFX.move();
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver();
            }
            drawNext();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            SFX.rotate();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPaused = true;
        let isGameRunning = false;

        function update(time = 0) {
            if (isPaused || !isGameRunning) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            if (!isPaused) {
                pauseDisplay.style.display = 'none';
                lastTime = performance.now();
                update();
            } else {
                pauseDisplay.style.display = 'block';
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('lines').innerText = player.lines;
            dropInterval = Math.max(100, 1000 - (player.lines * 20));
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0, lines: 0 };

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            pauseDisplay.style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.lines = 0;
            player.next = null;
            playerReset();
            updateScore();
            isGameRunning = true;
            isPaused = false;
            lastTime = performance.now();
            update();
        }

        function gameOver() {
            isGameRunning = false;
            isPaused = true;
            SFX.gameOver();
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score-display').innerText = 'Score: ' + player.score;
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 80) { // 'P'
                togglePause();
                return;
            }

            if (isPaused || !isGameRunning) return;

            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 32) playerHardDrop();
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        draw();
    </script>
</body>
</html>
