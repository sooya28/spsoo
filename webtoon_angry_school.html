<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앵그리스쿨 - 수야의 웹툰</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            background-image: linear-gradient(135deg, #0f0f0f 0%, #2c3e50 100%);
            background-attachment: fixed;
        }
        .webtoon-header {
            text-align: center;
            padding: 4rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid #e74c3c;
            margin-bottom: 3rem;
        }
        .webtoon-header h1 {
            color: #e74c3c;
            font-size: 3.5rem;
            text-shadow: 2px 2px 10px rgba(231, 76, 60, 0.5);
            margin-bottom: 1rem;
        }
        .webtoon-header p {
            color: #ccc;
            font-size: 1.2rem;
        }
        .episode-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }
        .episode-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            padding: 1.5rem;
            gap: 2rem;
        }
        .episode-card:hover {
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.1);
            border-color: rgba(231, 76, 60, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
        .episode-main-link {
            display: flex;
            align-items: center;
            gap: 2rem;
            text-decoration: none;
            color: inherit;
            flex-grow: 1;
        }
        .episode-thumb {
            width: 120px;
            height: 120px;
            background: #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }
        .episode-main-link:hover .episode-thumb {
            border-color: #e74c3c;
        }
        .episode-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .episode-info h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            color: #fff;
            transition: color 0.3s;
        }
        .episode-main-link:hover h2 {
            color: #e74c3c;
        }
        .episode-info h2::before { display: none; }
        .episode-info p {
            margin: 0;
            color: #999;
            font-size: 1rem;
        }
        .summary-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.1) 0%, rgba(230, 126, 34, 0.1) 100%);
            border: 2px solid #f39c12;
            color: #f39c12;
            text-decoration: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            min-width: 100px;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.1);
        }
        .summary-link:hover {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: #fff;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4);
        }
        .summary-icon {
            font-size: 1.5rem;
        }
        .summary-container {
            display: flex;
            gap: 0.8rem;
            flex-shrink: 0;
        }
        .back-home {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: #444;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: background 0.3s;
        }
        .back-home:hover {
            background: #555;
        }
        .mini-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }
        .mini-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .nav-logo {
            color: #e74c3c !important;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">수야의 도구들</a>
            <ul class="nav-menu">
                <li><a href="index.html" style="color: #eee;">홈으로</a></li>
            </ul>
        </div>
    </nav>

    <header class="webtoon-header">
        <h1>ANGRY SCHOOL</h1>
        <p>거친 학교 생활 속에서 벌어지는 분노와 열정의 이야기</p>
    </header>

    <main class="episode-container">
        <div class="button-group">
            <a href="index.html" class="back-home">← 메인 페이지로 돌아가기</a>
            <a href="webtoon_mini.html" class="mini-btn">✨ 요약 4컷 만화 전체보기</a>
        </div>
        
        <div class="episode-list">
            <div class="episode-card">
                <a href="webtoon/angry school/angry school1.png" target="_blank" class="episode-main-link">
                    <div class="episode-thumb">
                        <img src="webtoon/angry school/angry school1.png" alt="1화">
                    </div>
                    <div class="episode-info">
                        <h2>앵그리스쿨 1화</h2>
                        <p>전설의 시작, 전학생의 등장</p>
                    </div>
                </a>
                <a href="webtoon/angry school/Mini_angry1.png" target="_blank" class="summary-link">
                    <span class="summary-icon">📖</span>
                    <span>1화 요약</span>
                </a>
            </div>

            <div class="episode-card">
                <a href="webtoon/angry school/angry school2.png" target="_blank" class="episode-main-link">
                    <div class="episode-thumb">
                        <img src="webtoon/angry school/angry school2.png" alt="2화">
                    </div>
                    <div class="episode-info">
                        <h2>앵그리스쿨 2화</h2>
                        <p>폭풍전야, 첫 번째 충돌</p>
                    </div>
                </a>
                <!-- 2화 요약본 없음 -->
            </div>

            <div class="episode-card">
                <a href="webtoon/angry school/angry school3.png" target="_blank" class="episode-main-link">
                    <div class="episode-thumb">
                        <img src="webtoon/angry school/angry school3.png" alt="3화">
                    </div>
                    <div class="episode-info">
                        <h2>앵그리스쿨 3화</h2>
                        <p>심화되는 갈등, 피할 수 없는 대결</p>
                    </div>
                </a>
                <a href="webtoon/angry school/Mini_angry3.png" target="_blank" class="summary-link">
                    <span class="summary-icon">📖</span>
                    <span>3화 요약</span>
                </a>
            </div>

            <div class="episode-card">
                <a href="webtoon/angry school/angry school4.png" target="_blank" class="episode-main-link">
                    <div class="episode-thumb">
                        <img src="webtoon/angry school/angry school4.png" alt="4화">
                    </div>
                    <div class="episode-info">
                        <h2>앵그리스쿨 4화</h2>
                        <p>격전의 연속, 뜻밖의 전개</p>
                    </div>
                </a>
                <div class="summary-container">
                    <a href="webtoon/angry school/Mini_angry4.png" target="_blank" class="summary-link">
                        <span class="summary-icon">📖</span>
                        <span>4화 요약 1</span>
                    </a>
                    <a href="webtoon/angry school/Mini_angry4_2.png" target="_blank" class="summary-link">
                        <span class="summary-icon">📜</span>
                        <span>4화 요약 2</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 수야의 웹툰. All rights reserved.</p>
    </footer>
</body>
</html>
